                    questions = questions.sort(() => 0.5 - Math.random()).slice(0, 80);
                }

                setCurrentIndex(0);

                setSelectedAnswer(null);
                setUserAnswers({});

                if (key === currentQuestions[currentIndex].answer) {
                    setScore(s => s + 1);

                                            btnClass += "border-green-500 bg-green-50 text-green-800";
                                            icon = <Icon path={paths.CheckCircle2} className="w-6 h-6 text-green-500 flex-shrink-0 mt-0.5" />;
                                        } else if (isSelected && !isCorrectAnswer) {
                                            btnClass += "border-red-400 bg-red-50 text-red-800";
                                            icon = <Icon path={paths.XCircle} className="w-6 h-6 text-red-500 flex-shrink-0 mt-0.5" />;
                                        } else {
                                            btnClass += "border-slate-100 bg-slate-50 opacity-50 cursor-not-allowed";
                                        }
                                    }

                                    return (
                                        <button
                                            key={opt.key}
                                            onClick={() => handleSelect(opt.key)}
                                            disabled={selectedAnswer !== null}
                                            className={btnClass}
                                        >
                                            <span className={`font-black flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full text-sm ${selectedAnswer ? (isCorrectAnswer ? 'bg-green-200 text-green-700' : isSelected ? 'bg-red-200 text-red-700' : 'bg-slate-200 text-slate-500') : 'bg-slate-100 text-slate-500'}`}>
                                                {opt.key}
                                            </span>
                                            <span className="flex-1 font-medium text-lg pt-0.5">{opt.text}</span>
                                            {icon}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="h-20 flex items-center justify-center">
                            {selectedAnswer && (
                                <button 
                                    onClick={handleNext}
                                    className="w-full md:w-auto bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-12 rounded-2xl transition-transform active:scale-95 flex items-center justify-center space-x-2 shadow-lg"
                                >
                                    <span>{currentIndex === currentQuestions.length - 1 ? '查看成績' : '下一題'}</span>
                                    <Icon path={paths.ChevronRight} className="w-5 h-5" />
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 4. 掛載 React 應用程式到畫面
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
